version: "3.9"

name: task-tracker

services:
  api:
    hostname: api
    container_name: api
    build:
      context: ../
      dockerfile: Dockerfile.dev
    restart: always
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    # depends_on:
    # database:
    #   condition: service_healthy
    networks:
      - backend

  database:
    hostname: database
    container_name: database
    image: postgres:16-alpine
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: ["infra"]

  redis:
    hostname: redis
    container_name: redis
    image: redis:7-alpine
    restart: always
    ports:
      - "7000:6379"
    command: redis-server --save 60 1 --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - backend
    profiles: ["infra"]

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
