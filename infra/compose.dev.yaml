version: "3.9"

name: task-tracker

services:
  api:
    hostname: api
    container_name: api
    build:
      context: ../
      dockerfile: Dockerfile.dev
    restart: always
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  database:
    hostname: database
    container_name: database
    image: postgres:16-alpine
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_DATABASE:-tracker}
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: ["infra"]

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
