name: workflow

on:
  pull_request:
    branches: ["dev", "main"]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      HOST: localhost
      PORT: 3000
      DB_USERNAME: tracker
      DB_PASSWORD: tracker
      DB_DATABASE: tracker
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: test
      JWT_EXPIRES_IN: 1d
      NODE_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Apply db migrations
        run: pnpm db:migrate

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:ci

      - name: Build
        run: pnpm build
